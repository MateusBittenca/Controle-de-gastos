services:
  db:
    image: postgres:16-alpine
    container_name: financas-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-financas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-financas_dev}
      POSTGRES_DB: ${POSTGRES_DB:-financas}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-financas} -d ${POSTGRES_DB:-financas}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: financas-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-financas}:${POSTGRES_PASSWORD:-financas_dev}@db:5432/${POSTGRES_DB:-financas}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      NODE_ENV: ${NODE_ENV:-development}
      API_PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - full

  adminer:
    image: adminer:4
    container_name: financas-adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools

volumes:
  postgres_data:
